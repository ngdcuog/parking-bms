version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: parking-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=ParkingSecurePassword123!
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  api:
    build:
      context: ./ParkingBMS.API
      dockerfile: Dockerfile
    container_name: parking-api
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=ParkingBMS;User Id=sa;Password=ParkingSecurePassword123!;TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
    restart: on-failure

  gateway:
    build:
      context: ./ParkingBMS.Gateway
      dockerfile: Dockerfile
    container_name: parking-gateway
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__parking-api__Destinations__parking-api-destination__Address=http://api:8080
    depends_on:
      - api
    restart: on-failure

  web:
    build:
      context: ./ParkingBMS.Web
      dockerfile: Dockerfile
    container_name: parking-web
    ports:
      - "5173:80"
    depends_on:
      - gateway
    restart: on-failure

volumes:
  mssql-data:
